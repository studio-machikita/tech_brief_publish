<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-04-21</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-social {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 1rem;
}
.footer-social a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.footer-social a:hover {
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
}
.footer-spotify {
  width: auto !important;
  border-radius: 6px !important;
  padding: 0 8px;
}
.spotify-badge {
  height: 20px;
  width: auto;
  display: block;
}
.spotify-badge-light { display: none; }
.spotify-badge-dark { display: block; }
[data-theme="light"] .spotify-badge-light { display: block; }
[data-theme="light"] .spotify-badge-dark { display: none; }
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

## 📦 ケフィア：独立したC17/C23コンパイラ
\`OSS\` \`DevOps\`

<details>
<summary>📄 原題: kefir: Independent C17/C23 compiler</summary>
</details>

> **一言で**: C17/C23対応の独立実装コンパイラ「kefir」が公開

- kefirはGCCやClangに依存しない、独自実装のCコンパイラ
- C17およびC23規格（最新のC言語標準）に対応
- sourcehut上でOSSとして開発・公開されている
- メーリングリストやチケット管理など、開発インフラも整備済み

💡 **なぜ重要か**
GCCやClangが事実上の標準となっているC言語コンパイラの世界で、独立した実装を持つことはエコシステムの多様性や規格準拠の検証において重要です。C23は比較的新しい規格であり、対応コンパイラはまだ少ない状況です。 独立したコンパイラ実装が増えることで、C言語規格の解釈の差異が明確になり、規格そのものの品質向上にも貢献できます。また、組み込み分野など特定用途向けのコンパイラ開発の参考実装としても活用される可能性があります。

🎯 **今日のアクション**
C言語の規格準拠や移植性を重視するプロジェクトでは、kefirを使ってコードをテストし、GCC・Clangとの挙動の差異を確認してみると有益です。OSSへの貢献に興味があるエンジニアは、チケットやメーリングリストから参加を検討してみてください。

🔗 [原文を読む](https://sr.ht/~jprotopopov/kefir/)

## 🔒 量子コンピュータは128ビット暗号に対する脅威ではない
\`Security\` \`Quantum\`

<details>
<summary>📄 原題: Quantum Computers Are Not a Threat to 128</summary>
</details>

> **一言で**: 量子コンピュータは対称暗号に脅威を与えない

- 要点1: 量子コンピュータが脅かすのはECDHやRSA、ECDSAなどの非対称暗号のみ
- 要点2: AESやSHA-2、SHA-3などの対称暗号アルゴリズムは影響を受けないとされる
- 要点3: 危機対応の優先順位は非対称暗号の移行に絞るべき

💡 **なぜ重要か**
量子コンピュータの進化により、Shorのアルゴリズム（素因数分解を高速化する量子計算手法）を使えば現行の非対称暗号が破られる懸念が高まっています。一方で、対称暗号への影響については誤解も多く、正確な理解が求められています。 セキュリティ移行の優先順位が明確になります。非対称暗号の置き換えは急務ですが、AESなどの対称暗号はそのまま使い続けられる可能性が高く、移行コストの見積もりや計画に直接影響します。

🎯 **今日のアクション**
まず自社システムで使っている暗号方式を棚卸しし、ECDHやRSAなど非対称暗号を使っている箇所を特定してください。対称暗号（AES-128以上）はすぐに置き換える必要はありませんが、非対称暗号はポスト量子暗号への移行計画を今から立てておくべきです。

🔗 [原文を読む](https://words.filippo.io/128-bits/)

## 🤖 GitHub - gizmo64k/soulplayer-c64: コモドール64上で動作する本物の2万5千パラメータのトランスフォーマー！
\`AI\` \`LLM\` \`Hardware\`

<details>
<summary>📄 原題: GitHub - gizmo64k/soulplayer-c64: A real 25k-parameter transformer running on a Commodore 64!</summary>
</details>

> **一言で**: Commodore 64上で2.5万パラメータのTransformerが動作

- 1980年代の8ビットPC「Commodore 64」上で、本物のTransformerモデルを動作させることに成功
- パラメータ数は約2万5千（25k）と極小ながら、アーキテクチャは現代のLLMと同じ構造
- OSSとしてGitHubで公開されており、実装の詳細を誰でも確認できる

💡 **なぜ重要か**
Commodore 64は1982年発売の8ビットPCで、クロック周波数は約1MHzです。現代のAIモデルが数十億パラメータを持つのと対照的に、このプロジェクトは極限まで削ぎ落としたモデルを動かすことで、Transformerの本質的な仕組みを理解する教材として機能します。ハードウェアの制約を逆手に取った実験的な取り組みです。 AIモデルの軽量化・エッジ展開への関心が高まる中、このプロジェクトはTransformerが「どこまで小さくできるか」という問いに対する極端な回答を示しています。教育的価値が高く、モデル圧縮や組み込みAIの研究者にとって示唆を与える事例になりそうです。

🎯 **今日のアクション**
AIの仕組みを根本から理解したいエンジニアは、このリポジトリのコードを読んでみると良いでしょう。パラメータ数を最小化してもTransformerとして成立する条件を考えることが、モデル設計力の向上につながります。

🔗 [原文を読む](https://github.com/gizmo64k/soulplayer-c64)

## 📊 ggsql: SQLのための文法的グラフィックス
\`Data\` \`OSS\`

<details>
<summary>📄 原題: ggsql: A grammar of graphics for SQL</summary>
</details>

> **一言で**: SQLクエリ内で可視化を記述できるggsqlが登場

- ggsqlはSQLの中に可視化の文法を直接組み込める新ツール
- 「グラマー・オブ・グラフィックス」の概念をSQLに持ち込んだ設計
- データ取得と可視化定義を1つのクエリで完結できる

💡 **なぜ重要か**
データ分析の現場では、SQLでデータを取得した後にPythonやRで可視化するという二段階の作業が一般的です。この分断がワークフローの手間を増やしていました。ggsqlはその境界をなくそうとするアプローチです。 SQLを主戦場とするデータアナリストやBIエンジニアが、別のツールに切り替えずに可視化まで完結できるようになる可能性があります。データパイプラインのシンプル化につながれば、分析ツールの設計思想にも影響を与えそうです。

🎯 **今日のアクション**
ggsqlの構文仕様やサポートするデータベースを確認し、既存のBIワークフローに組み込めるか小規模な検証から始めてみましょう。

🔗 [原文を読む](https://opensource.posit.co/blog/2026-04-20_ggsql_alpha_release/)

## 🧠 GitHub - Luce-Org/lucebox-hub: Lucebox最適化ハブ——特定のコンシューマー向けハードウェアに特化した、手動チューニング済みLLM推論エンジン。
\`LLM\` \`OSS\` \`Hardware\`

<details>
<summary>📄 原題: GitHub - Luce-Org/lucebox-hub: Lucebox optimization hub: hand-tuned LLM inference, built for specific consumer hardware.</summary>
</details>

> **一言で**: コンシューマ向けGPU特化のLLM推論最適化ハブ

- Luce-OrgがGitHubで「lucebox-hub」を公開。コンシューマ向け特定ハードウェア向けに手動チューニングしたLLM推論基盤
- 汎用ではなく特定ハードウェアへの最適化に特化している点が特徴的
- RTX 3090など一般入手可能なGPUでの高速推論を目指すプロジェクトと見られる

💡 **なぜ重要か**
大規模言語モデル（LLM）の推論はデータセンター向けGPUを前提とした実装が多く、コンシューマ向けGPUでは性能が出にくい課題があります。手動チューニングで特定ハードウェアの性能を引き出すアプローチは、個人開発者や小規模チームがローカルでLLMを動かすニーズに応えるものです。 クラウドに依存せずローカルでLLMを高速実行できる環境が整うと、プライバシーやコストの面で選択肢が広がります。特定ハードウェア向け最適化のノウハウがOSSとして蓄積されれば、エッジAI推論の底上げにつながる可能性があります。

🎯 **今日のアクション**
RTX 3090など手元にコンシューマ向けGPUがある場合、lucebox-hubのリポジトリを確認し、対応ハードウェアと推論速度の実績を検証してみる価値があります。ローカルLLM環境の構築を検討しているチームは参考にできるでしょう。

## 📦 呪術メガ合併、娯楽と利益のために
\`OSS\` \`DevOps\`

<details>
<summary>📄 原題: Jujutsu megamerges for fun and profit</summary>
</details>

> **一言で**: JujutsuでMegamergeを活用する方法を解説

- Jujutsuは、Gitの強みを活かしつつ使い勝手を改善した新世代のバージョン管理システム
- Megamerge（複数ブランチを一括統合する手法）をJujutsuで実践する内容だと見られる
- 履歴の書き換えやブランチ管理をより直感的なモデルで扱えるのが特徴

💡 **なぜ重要か**
Gitは長年デファクトスタンダードとして君臨していますが、複雑な操作や分かりにくいコマンド体系が課題でした。Jujutsuはそこに着目し、より洗練されたバージョン管理の体験を提供しようとするOSSプロジェクトです。Megamergeのような大規模な統合作業を効率化できる点が注目されています。 Jujutsuが普及すれば、チーム開発でのブランチ管理や大規模リポジトリの運用が大きく変わる可能性があります。Gitからの移行コストはあるものの、開発体験の向上が生産性に直結するため、採用を検討する組織が増えると見られます。

🎯 **今日のアクション**
まずJujutsuの公式ドキュメントを読み、既存のGitリポジトリと併用できる環境で試してみましょう。特に複数ブランチを頻繁に扱うプロジェクトでは、Megamergeの手法が有効かどうか検証する価値があります。

🔗 [原文を読む](https://isaaccorbrey.com/notes/jujutsu-megamerges-for-fun-and-profit)

## 📝 まとめ

これら3つのニュースに共通するのは、「制約された環境や古典的な技術基盤への回帰・再評価」というテーマである。kefirコンパイラはC言語という半世紀近い歴史を持つ言語の独立実装を追求し、Commodore 64上のTransformerはレトロハードウェアで現代的なAIを動作させるという挑戦であり、いずれも「最新・最大」を追い求める潮流とは逆向きのベクトルを持つ。量子コンピュータの脅威に関する冷静な評価も同様に、過剰な期待や恐怖に流されず技術の実態を地に足のついた視点で見直す姿勢を示している。こうした動向は、AI・量子・クラウドといった巨大トレンドが業界を席巻する中で、エンジニアコミュニティが誇大宣伝に対する懐疑心を持ちながら、基礎技術や制約環境の本質的な理解を大切にしようとする成熟した反応とも読み取れる。

## 🎯 今日の実務アクション 3 選

1. **ケフィア：独立したC17/C23コンパイラ**: C言語の規格準拠や移植性を重視するプロジェクトでは、kefirを使ってコードをテストし、GCC・Clangとの挙動の差異を確認してみると有益です。OSSへの貢献に興味があるエンジニアは、チケットやメーリングリストから参加を検討してみてください。
2. **量子コンピュータは128ビット暗号に対する脅威ではない**: まず自社システムで使っている暗号方式を棚卸しし、ECDHやRSAなど非対称暗号を使っている箇所を特定してください。対称暗号（AES-128以上）はすぐに置き換える必要はありませんが、非対称暗号はポスト量子暗号への移行計画を今から立てておくべきです。
3. **GitHub - gizmo64k/soulplayer-c64: コモドール64上で動作する本物の2万5千パラメータのトランスフォーマー！**: AIの仕組みを根本から理解したいエンジニアは、このリポジトリのコードを読んでみると良いでしょう。パラメータ数を最小化してもTransformerとして成立する条件を考えることが、モデル設計力の向上につながります。
