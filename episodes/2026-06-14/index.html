<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-06-14</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-social {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 1rem;
}
.footer-social a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.footer-social a:hover {
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
}
.footer-spotify {
  width: auto !important;
  border-radius: 6px !important;
  padding: 0 8px;
}
.spotify-badge {
  height: 20px;
  width: auto;
  display: block;
}
.spotify-badge-light { display: none; }
.spotify-badge-dark { display: block; }
[data-theme="light"] .spotify-badge-light { display: block; }
[data-theme="light"] .spotify-badge-dark { display: none; }
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

## 🤖 オープンソースのためのCodex
\`AI\` \`LLM\` \`OSS\`

<details>
<summary>📄 原題: Codex for Open Source</summary>
</details>

> **一言で**: オープンソースの14Bモデルが4日で競技プログラミング上位に到達

- Nous ResearchがNousCoder-14Bを公開。LiveCodeBench v6で67.87%を達成
- 学習はNvidia B200を48枚使い4日間。モデル重みだけでなく訓練環境も全公開
- 訓練に使った競技プログラミング問題は2万4千件で、利用可能なデータの上限に近い
- 人間の研究者が2年かけた成長をAIは96時間で再現。ただし必要問題数は24倍
- 今後の課題は合成データ生成と自己対戦（セルフプレイ）による訓練データの自動生成

💡 **なぜ重要か**
AIコーディング支援ツールはAnthropicのClaude Codeが話題を席巻する中、オープンソース陣営も急速に追い上げています。Nous Researchは訓練コードや強化学習環境まで公開する「再現可能な研究」を掲げており、大手プロプライエタリモデルへの対抗軸として注目されています。競技プログラミングは正誤が明確に検証できるため、強化学習との相性が良く、AIの推論能力向上の試金石として研究が集中しています。 高品質な訓練データの枯渇は、AIコーディングモデルの性能向上を今後制約する可能性があります。合成データ生成や自己対戦型の訓練が次の主戦場になると見られており、データ効率の高いアーキテクチャ研究の重要性が増します。また、訓練スタックの完全公開により、大企業だけでなく研究機関や個人開発者も競争に参加しやすくなり、AIコーディング分野の民主化が加速するでしょう。

🎯 **今日のアクション**
NousCoder-14BはHugging FaceでApache 2.0ライセンスで公開済みです。自社のコーディングタスクへの適用を試しつつ、Atroposフレームワークを使った独自ファインチューニングも検討する価値があります。データ枯渇の問題は他ドメインでも起きうるため、自社データの検証可能な形式への整備を今から進めておくと、将来の訓練コストを抑えられます。

🔗 [原文を読む](https://openai.com/form/codex-for-oss/)

## 🤖 RTX 5080 + RTX 3090構成：Qwen 3.6 27B Q8で毎秒80トークン以上を達成
\`AI\` \`LLM\` \`Hardware\`

<details>
<summary>📄 原題: RTX 5080 &amp;#43; RTX 3090 Setup: 80&amp;#43; Tok/s on Qwen 3.6 27B Q8</summary>
</details>

> **一言で**: デュアルGPU構成でローカルLLMが80tok/s超を達成

- RTX 5080とRTX 3090を組み合わせ、合計VRAMを40GB超に拡張
- Qwen 3.6 27B Q8量子化モデルで80tok/s以上の推論速度を実現
- 当初Q4量子化で約30tok/sだったが、構成改善で大幅に向上

💡 **なぜ重要か**
ローカルでLLMを動かすには大容量VRAMが必要で、単体GPUでは限界があります。RTX 5080の16GBだけではQwen 3.6などの大型モデルを快適に動かせず、中古のRTX 3090（24GB）を追加することで現実的な解決策を模索した事例です。コンシューマー向けGPUの組み合わせでプロ級の推論速度を出せるか、という問いへの実践的な回答といえます。 高価なサーバー向けGPUを使わなくても、中古コンシューマーGPUの組み合わせで実用的なローカルLLM環境を構築できることが示されました。AIインフラのコスト障壁が下がり、個人や小規模チームでも大型モデルを自前で運用する選択肢が広がりそうです。

🎯 **今日のアクション**
VRAMが不足していてローカルLLMの速度に不満がある場合、中古のRTX 3090はコストパフォーマンスの高い増強手段として検討する価値があります。マルチGPU構成時のドライバ設定やllama.cppなどの推論エンジン側の設定も合わせて確認しておきましょう。

## 🔧 Intel 8087浮動小数点チップの中核を担う加算器
\`Hardware\` \`Science\`

<details>
<summary>📄 原題: The adder at the heart of Intel&amp;#39;s 8087 floating-point chip</summary>
</details>

> **一言で**: Intel 8087の加算器回路をリバースエンジニアリングで解析

- 1980年発売のIntel 8087は、浮動小数点演算を最大100倍高速化したコプロセッサ
- 四則演算・平方根に加え、正接・指数・対数などの超越関数も計算できた
- その演算能力の核心は、チップ内部の加算器（adder）回路にあったと見られる
- Ken Shirriffによるシリコンレベルのリバースエンジニアリング記事

💡 **なぜ重要か**
Intel 8087はx87浮動小数点命令セットの原点であり、現代のPC用CPUにも受け継がれる設計思想の礎です。当時のハードウェア設計を回路レベルで解析する試みは、コンピュータ史の理解を深めるうえで貴重です。 現代のCPU設計者や半導体エンジニアにとって、40年以上前の設計判断を一次資料として学べる機会になります。レトロコンピューティングの知見が、現代の低レイヤー技術教育にも活用される流れが続くでしょう。

🎯 **今日のアクション**
低レイヤー技術に興味があるエンジニアは、Ken Shirriffのブログを定期的に読むことで、ハードウェア設計の基礎知識を体系的に補強できます。

🔗 [原文を読む](https://www.righto.com/2026/06/intel-8087-adder-reverse-engineered.html)

## 📦 オーソドックスC++ | Branimir Karadžićのホームページ
\`OSS\`

<details>
<summary>📄 原題: Orthodox C&amp;#43;&amp;#43; | Branimir Karadžić&amp;#39;s Home Page</summary>
</details>

> **一言で**: Modern C++を避けるミニマルなC++サブセット「Orthodox C++」の提唱

- Orthodox C++（C+とも呼ばれる）はCを改善しつつ、Modern C++の過剰な機能を排除したサブセット
- Modern C++の複雑化への反省から生まれた、シンプルさを重視する設計思想
- 1990年代後半のC++ブームへの反省を踏まえ、必要最小限の機能だけを使う方針を提唱

💡 **なぜ重要か**
C++はバージョンを重ねるごとに機能が膨大になり、Modern C++（C++11以降）はテンプレートメタプログラミングやラムダ式など複雑な機能を多数導入しました。一方でゲームエンジンや組み込み系など、シンプルで予測可能なコードが求められる現場では、こうした複雑性がむしろ障害になるケースもあります。Orthodox C++はそうした現場のニーズに応える考え方として注目されています。 大規模なゲームエンジンやシステムソフトウェアの開発現場では、コードの可読性や保守性を優先してModern C++の機能を意図的に制限する動きが続いています。Orthodox C++のような考え方が広まることで、チームの技術標準やコーディングガイドラインの見直しが促される可能性があります。

🎯 **今日のアクション**
自チームのC++コーディング規約を見直し、本当に必要な機能だけを許可するサブセット方針を検討してみましょう。複雑な機能の導入前に、シンプルな代替手段がないか確認する習慣が保守性向上につながります。

🔗 [原文を読む](https://bkaradzic.github.io/posts/orthodoxc++/)

## 🌐 アラビア語タイポグラフィのレンダリングにおける素晴らしい体験と技術的負債への双方向入門
\`Web\`

<details>
<summary>📄 原題: An interactive introduction to the terrific experience of rendering Arabic typography and its technical debt</summary>
</details>

> **一言で**: アラビア語タイポグラフィのレンダリング技術的負債を解説

- フロントエンドのチケットをきっかけに、アラビア語描画の複雑さを体験した記録
- アラビア語は右から左に書く特性など、Web描画で特有の技術的課題がある
- インタラクティブな形式で、アラビア語タイポグラフィの技術的負債を紹介
- Lobstersコミュニティでも議論されるほど、関心を集めた内容だそうです

💡 **なぜ重要か**
アラビア語は世界で4億人以上が使う言語ですが、Webのタイポグラフィ（文字組版）技術は長らく欧米の左横書きを前提に発展してきました。右から左への記述方向や、文字が前後の文字によって形を変える「字形結合」など、アラビア語特有の仕様はブラウザやフォントエンジンに複雑な処理を要求します。こうした課題は多言語対応を進めるWeb開発の現場で、今も技術的負債として残りやすい領域です。 グローバル展開するWebサービスが増える中、アラビア語圏ユーザーへの対応は避けられない課題になりつつあります。この種の知見が広まることで、多言語対応の設計を後回しにする「技術的負債」を早期に意識するエンジニアが増えると期待されます。

🎯 **今日のアクション**
アラビア語など双方向テキスト（BiDi）を扱う可能性があるプロジェクトでは、設計初期からUnicode BiDiアルゴリズムやCSSの\`direction\`プロパティへの対応を検討しておくことが重要です。

## 🌐 すべてのコマが完璧

<details>
<summary>📄 原題: Every Frame Perfect</summary>
</details>

> **一言で**: UIの「完璧なフレーム」を目指す設計思想

- Waylandの設計目標「every frame is perfect」をUIデザインにも応用する考え方
- GPUスタックの複雑化に対し、Waylandは描画の完全な制御を取り戻そうとしている
- 技術的な描画品質の追求が、UI設計全体の指針になり得るという提言

💡 **なぜ重要か**
Wayland はLinux向けの次世代ディスプレイサーバープロトコルで、古いX11の置き換えを目指しています。現代のGPUスタックは非常に複雑で、画面描画の品質管理が難しくなっています。その中で「すべてのフレームを完璧に」という目標は、技術的な誠実さを象徴するものとして注目されています。 描画品質への厳格なこだわりがUIフレームワークや開発ツールの設計思想に波及すれば、ユーザー体験の底上げにつながります。「妥協しない品質」を開発文化として根付かせるきっかけになる可能性があります。

🎯 **今日のアクション**
自分のアプリやUIで「毎フレーム本当に正しく描画されているか」を問い直してみましょう。描画の遅延やちらつきを許容せず、品質基準を明文化することが第一歩です。

## 📝 まとめ

これら3つのニュースに共通して流れるテーマは、**AIと計算処理の民主化・個人化**と、それを支えるハードウェアへの深い関心である。CodexのオープンソースモデルやデュアルGPU構成によるローカルLLMの高速化は、かつて大企業や研究機関にしか扱えなかった高性能AIが、個人や小規模コミュニティの手に届くようになってきたことを鮮明に示している。一方でIntel 8087のリバースエンジニアリングは一見レトロな話題に映るが、現代のAI処理を支える浮動小数点演算のルーツを掘り下げようとするエンジニアの知的好奇心の表れであり、ハードウェアの仕組みを根本から理解したいという欲求が高まっている時代の空気を反映している。つまり、ソフトウェア面では誰でも最先端モデルを動かせる環境が整いつつある一方で、それを支えるシリコンの原理にまで立ち返ろうとする動きが同時進行しており、テクノロジーの「上」と「下」の両方向への探求が加速していると言えるだろう。
