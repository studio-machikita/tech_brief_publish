<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-03-24</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

<script>
const PLAUSIBLE_DOMAIN = "";
const PLAUSIBLE_SCRIPT_SRC = "https://plausible.io/js/script.js";
const ANALYTICS_CONSENT_KEY = 'site.analyticsConsent';

function loadPlausible() {
  if (!PLAUSIBLE_DOMAIN) return;
  if (document.querySelector('script[data-plausible-loader="true"]')) return;
  var script = document.createElement('script');
  script.defer = true;
  script.src = PLAUSIBLE_SCRIPT_SRC;
  script.setAttribute('data-domain', PLAUSIBLE_DOMAIN);
  script.setAttribute('data-plausible-loader', 'true');
  document.head.appendChild(script);
}

function hideConsentBanner() {
  var banner = document.getElementById('consent-banner');
  if (banner) banner.hidden = true;
}

function showConsentBanner() {
  var banner = document.getElementById('consent-banner');
  if (banner) banner.hidden = false;
}

function updateConsentUi() {
  if (!PLAUSIBLE_DOMAIN) {
    hideConsentBanner();
    return;

## 🤖 エージェント向けStack Overflow
\`AI\` \`LLM\` \`OSS\`

<details>
<summary>📄 原題: cq: Stack Overflow for Agents</summary>
</details>

> **一言で**: AIエージェント向け共有知識基盤「cq」の提案

- cqはAIエージェントが過去の学習結果を照会・共有できる仕組みを探る
- エージェントが同じ失敗を繰り返さないための「共有コモンズ」を目指す
- Stack Overflowのように、知識を蓄積・再利用できる場の構築を提案

💡 **なぜ重要か**
AIエージェントは現状、それぞれが孤立して動作しており、同じ問題を何度も解決し直すという非効率が生じています。人間のエンジニアがStack Overflowで知見を共有するように、エージェント同士が学習結果を持ち寄れる場があれば、全体の精度と効率が上がると期待されています。 エージェント間の知識共有が標準化されれば、AIシステムの開発コストが下がり、同じミスの繰り返しによる品質劣化を防げる可能性があります。長期的には、エージェントの「集合知」がソフトウェア開発の生産性を大きく底上げするかもしれません。

🎯 **今日のアクション**
自社でAIエージェントを運用しているチームは、エージェントの実行ログや失敗事例を記録・再利用できる仕組みを今から設計しておくと、将来的な共有基盤への移行がスムーズになるでしょう。

🔗 [原文を読む](https://blog.mozilla.ai/cq-stack-overflow-for-agents/)

## 🤖 ProofShot — AIが生成したコードのビジュアル検証ツール
\`AI\` \`DevOps\` \`OSS\`

<details>
<summary>📄 原題: ProofShot — Visual proof for AI-built code</summary>
</details>

> **一言で**: AIが書いたコードを映像と証跡で自動検証するツール

- ProofShotはAIエージェントが生成したコードの動作を、動画・エラーログ・証跡ファイルで記録する
- npmでグローバルインストールするだけで使え、MITライセンスのOSSとして公開
- AIが「完成した」と報告した後の実際の動作を、視覚的に確認できる仕組みを提供

💡 **なぜ重要か**
AIによるコード自動生成が普及する一方、生成されたコードが本当に正しく動くかを人間が逐一確認するコストが課題になっています。特にUIの挙動はテキストログだけでは把握しにくく、視覚的な証跡の需要が高まっています。 AIエージェントによる開発が広がるほど、その出力を検証する仕組みの重要性も増します。ProofShotのようなツールが普及すれば、AIの自律的な開発サイクルに「証明責任」という概念が組み込まれ、品質保証のあり方が変わる可能性があります。

🎯 **今日のアクション**
AIコーディングエージェントを業務で使っているチームは、ProofShotをCI/CDパイプラインに組み込み、AIが生成したUIの動作記録を自動で残す運用を検討してみてください。

🔗 [原文を読む](https://proofshot.argil.io/)

## 🤖 クロードコード チートシート
\`AI\` \`LLM\` \`DevOps\`

<details>
<summary>📄 原題: Claude Code Cheat Sheet</summary>
</details>

> **一言で**: Claude Codeの最新チートシートが公開

- v2.1.81対応：\`--bare\`フラグでフック・LSP・プラグインなしの軽量モードが追加
- \`/fork\`コマンドが\`/branch\`に改名（旧名はエイリアスとして継続）
- Model Context Protocol（MCP）のプッシュメッセージ対応が\`--channels\`オプションでプレビュー提供
- 停止中のエージェントをSendMessageで自動再開できる機能が追加
- キーボードショートカット一覧など、開発効率を上げる情報をまとめたリファレンス

💡 **なぜ重要か**
Claude Codeはコーディング支援AIツールとして急速に機能拡張が進んでいます。バージョンアップのたびに新フラグやコマンドが増えるため、開発者が変更点を素早く把握できるチートシートの需要が高まっています。 AIコーディングツールの機能が複雑化するにつれ、こうしたリファレンス資料の整備が開発現場での定着を左右します。特にMCPのプッシュメッセージ対応は、AIエージェントと外部ツール連携の幅を広げる可能性があります。

🎯 **今日のアクション**
Claude Codeを業務で使っているエンジニアは、\`--bare\`フラグや\`/branch\`コマンドなど変更点を確認し、既存のスクリプトやワークフローへの影響を早めにチェックしましょう。

🔗 [原文を読む](https://cc.storyfox.cz)

## 🔧 BIO - Bao I/Oコプロセッサ
\`Hardware\` \`OSS\`

<details>
<summary>📄 原題: BIO - The Bao I/O Co-Processor</summary>
</details>

> **一言で**: RISC-VマイコンBaochip-1xのI/Oコプロセッサ「BIO」が公開

- bunnie氏がCrowd SupplyでBaochip-1xの評価ボード「Dabao」をクラウドファンディング中
- BIOはBaochip-1xに搭載されたI/O専用のコプロセッサ
- RTL（回路設計データ）の大部分をオープンソースとして公開予定
- RISC-Vアーキテクチャを採用した新しいマイクロコントローラ

💡 **なぜ重要か**
bunnie氏はオープンハードウェア界隈で著名なエンジニアです。RISC-Vベースのチップ設計をオープンなRTLとともに公開する動きは、ハードウェアのオープンソース化という観点で注目されています。I/O処理を専用コプロセッサに分離する設計は、メインコアの負荷を下げる手法として知られています。 オープンなRTLを持つRISC-Vマイコンが増えることで、カスタムチップ設計の敷居が下がります。特に組み込み分野でのオープンハードウェア活用が広がる可能性があります。

🎯 **今日のアクション**
組み込みやハードウェア開発に関わるエンジニアは、Crowd SupplyのDabao評価ボードのページを確認し、BIOのアーキテクチャ詳細を追うと良いでしょう。

🔗 [原文を読む](https://www.crowdsupply.com/baochip/dabao/updates/bio-the-bao-i-o-co-processor)

## 📦 GitHub - dune3d/dune3d: 3DCADアプリケーション
\`OSS\` \`Hardware\`

<details>
<summary>📄 原題: GitHub - dune3d/dune3d: 3D CAD application</summary>
</details>

> **一言で**: オープンソースの3D CADアプリ「Dune3d」が公開

- Dune3dはGitHub上で公開されているオープンソースの3D CADアプリケーション
- リポジトリ名はdune3d/dune3dで、誰でもソースコードを参照・利用できる
- 商用CADツールの代替となりうるOSS（オープンソースソフトウェア）として注目

💡 **なぜ重要か**
3D CADツールは製造業や設計分野で欠かせないソフトウェアですが、商用製品は高額なライセンス費用がかかります。オープンソースの選択肢は以前からFreeCADなどが存在しますが、使いやすさや機能面での課題も多く、新たな選択肢への需要は根強くあります。 オープンソースの3D CADツールが充実することで、個人開発者やスタートアップが低コストで設計・試作を行いやすくなります。ハードウェア開発の裾野が広がり、ものづくりのデジタル化を後押しする可能性があります。

🎯 **今日のアクション**
ハードウェア開発や3Dモデリングに携わるエンジニアは、Dune3dのリポジトリを確認し、既存ツールとの機能比較や実務での活用可能性を検討してみてください。OSSプロジェクトへの貢献も視野に入れると良いでしょう。

🔗 [原文を読む](https://github.com/dune3d/dune3d)

## 📦 ログファイルナビゲーター
\`OSS\` \`DevOps\`

<details>
<summary>📄 原題: The Logfile Navigator</summary>
</details>

> **一言で**: ターミナル向け高機能ログビューア「lnav」

- lnav（Logfile Navigator）はサーバー不要・設定不要で使えるログ閲覧ツール
- ディレクトリを指定するだけでファイル形式を自動検出し、圧縮ファイルも対応
- ログのマージ・追跡・検索・フィルタ・クエリをターミナル上で一括処理できる
- ssh playground@demo.lnav.org でブラウザなしにすぐ試せるデモ環境あり

💡 **なぜ重要か**
本番環境のトラブル対応では、複数サービスのログを素早く横断的に確認する必要があります。クラウド（サーバーやインフラ）の大規模ログ基盤を用意できない小規模チームや個人開発者にとって、ターミナルだけで完結する軽量ツールの需要は根強くあります。 lnavのようなゼロセットアップのログ解析ツールが普及すると、重厚なログ管理基盤を導入しにくい小規模チームでも、障害調査の初動を素早く行えるようになります。DevOpsの現場でターミナルベースのツールが見直されるきっかけになるかもしれません。

🎯 **今日のアクション**
まずはsshデモで操作感を確認し、自分のプロジェクトのログディレクトリに向けて試してみましょう。既存のtailやgrepによる作業と比較し、チームへの導入可否を判断するのが現実的な第一歩です。

🔗 [原文を読む](https://lnav.org/)

## 📝 まとめ

function renderMarkdown(md) {
  if (typeof marked !== 'undefined' && typeof DOMPurify !== 'undefined') {
    marked.setOptions({ breaks: true });
    return DOMPurify.sanitize(marked.parse(md));
  }
  var el = document.createElement('pre');
  el.style.whiteSpace = 'pre-wrap';
  el.textContent = md;
  return el.outerHTML;
}
document.getElementById('tab-blog').innerHTML = renderMarkdown(blogMd);
document.getElementById('tab-notes').innerHTML = renderMarkdown(notesMd);

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  if (tab === 'blog') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('tab-blog').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('tab-notes').classList.add('active');
  }
}
