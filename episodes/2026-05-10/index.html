<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-05-10</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-social {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 1rem;
}
.footer-social a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.footer-social a:hover {
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
}
.footer-spotify {
  width: auto !important;
  border-radius: 6px !important;
  padding: 0 8px;
}
.spotify-badge {
  height: 20px;
  width: auto;
  display: block;
}
.spotify-badge-light { display: none; }
.spotify-badge-dark { display: block; }
[data-theme="light"] .spotify-badge-light { display: block; }
[data-theme="light"] .spotify-badge-dark { display: none; }
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

## 🤖 LLMに委任すると文書が歪められる
\`AI\` \`LLM\` \`Security\`

<details>
<summary>📄 原題: LLMs Corrupt Your Documents When You Delegate</summary>
</details>

> **一言で**: LLMへの委任がドキュメントを破損させるリスク

- LLMにドキュメント編集を委任すると、意図しない内容の改変が起きる可能性がある
- 単純な要約や書き換えでも、元の情報が失われたり歪められたりするリスクがある
- LLMの自動処理を信頼しすぎることへの警鐘を鳴らす研究論文と見られる

💡 **なぜ重要か**
LLM（大規模言語モデル）を使ってドキュメントの作成・編集・要約を自動化する動きが急速に広まっています。しかし、モデルが出力する内容が元の意図や事実と一致するかどうかの検証は、まだ十分に議論されていません。この研究はそのリスクを正面から取り上げたものと見られます。 企業がLLMをドキュメント管理や業務フローに組み込む際、出力内容の品質保証が新たな課題になります。自動化の恩恵を受けながらも、人間によるレビュー工程を省略できない場面が増えるでしょう。

🎯 **今日のアクション**
LLMにドキュメント処理を任せる場合は、必ず人間が差分を確認するレビュー工程を設けてください。特に重要な仕様書や契約文書への適用は慎重に判断することをお勧めします。

🔗 [原文を読む](https://arxiv.org/abs/2604.15597)

## 🌐 クエリ文字列を禁止した
\`Web\` \`Security\`

<details>
<summary>📄 原題: I’ve banned query strings</summary>
</details>

> **一言で**: トラッキング用クエリ文字列をURLから追放する宣言

- 要点1: サイト運営者がトラッキング目的のクエリ文字列（?ref=など）を自サイトのURLで拒否する方針を表明
- 要点2: Refererヘッダーで取得できる情報をURLに付加するのはユーザーへの不当な追跡だと批判
- 要点3: 求めていない追跡パラメータをURLに付けることはユーザーの信頼を損なう行為と主張

💡 **なぜ重要か**
?ref=や?utm_source=といったトラッキング用パラメータをURLに付加する慣行は、マーケティング分析の名目で広く普及しています。しかしプライバシー意識の高まりとともに、こうした慣行を問題視する声も増えています。 ユーザーのプライバシーを重視するサイト設計の議論が活発になる可能性があります。トラッキングパラメータの除去ツールやブラウザ拡張機能への関心も高まるかもしれません。

🎯 **今日のアクション**
自サービスのURLにトラッキングパラメータを付加する必要性を改めて見直し、Refererヘッダーなど既存の仕組みで代替できないか検討してみましょう。

🔗 [原文を読む](https://chrismorgan.info/no-query-strings)

\`OSS\` \`DevOps\` \`Web\`

💡 **なぜ重要か**
Zedは高速動作で注目を集めるコードエディタです。エディタの個人化ニーズは根強く、テーマのカスタマイズ機能は開発者体験を大きく左右します。専用のTheme Builderを用意することで、より多くのユーザーが独自テーマを作りやすくなります。 テーマ作成の敷居が下がることで、Zedのエコシステムが広がる可能性があります。コミュニティ主導のテーマ共有が活発になれば、Zedの採用率向上にもつながると見られています。

## 🔒 Googleが「脱Google」AndroidユーザーのreCAPTCHAを機能不全にした
\`Security\` \`Mobile\` \`Web\`

<details>
<summary>📄 原題: Google Broke reCAPTCHA for De-Googled Android Users</summary>
</details>

> **一言で**: GoogleがreCAPTCHAをGoogle非依存Android環境で破壊

- 脱Google化したAndroid端末でreCAPTCHAが機能しなくなった
- Googleのサービスを証明するために、Google自身のソフトウェアが必須になった
- 「ボットでないこと」の証明がGoogleエコシステムへの依存を前提とする構造に

💡 **なぜ重要か**
reCAPTCHAはウェブ上で広く使われるボット判定の仕組みです。近年、プライバシーを重視するユーザーの間でGoogleのサービスを排除した「脱Google」Android環境（GrapheneOSなど）の利用が広がっています。今回の変更により、そうした環境ではreCAPTCHAが正常に動作しなくなったと見られています。Googleのインフラに依存しないことを選んだユーザーが、Googleのサービスなしではウェブの基本機能すら使えなくなるという矛盾が生じています。 ウェブの重要インフラがGoogle依存を前提とする設計になると、プライバシー重視のユーザーや代替OSの開発者は事実上排除されます。特定企業がボット判定という「通行証」を握ることで、インターネットへのアクセス自体が間接的にコントロールされるリスクが高まります。オープンな代替手段の必要性が改めて問われる局面です。

🎯 **今日のアクション**
自社サービスでreCAPTCHAを採用している場合、hCaptchaやFriendlyCaptchaなどの代替手段を評価しておくことを勧めます。特定プロバイダーへの依存度を定期的に見直し、ユーザーの多様な環境に対応できる設計を意識してください。

🔗 [原文を読む](https://reclaimthenet.org/google-broke-recaptcha-for-de-googled-android-users)

## 💼 私は車を捕まえた｜決定不能性
\`Business\` \`Startup\`

<details>
<summary>📄 原題: I caught the car | undecidability</summary>
</details>

> **一言で**: 大卒2.5年でシニアエンジニアに昇進した体験談

- 2023年7月に新卒でソフトウェアエンジニアとしてキャリアをスタート

- 昇進自体より、そこに至る思考や気づきを共有することが目的だそうです

💡 **なぜ重要か**
ソフトウェアエンジニアのキャリア成長速度は近年注目されています。特に若手エンジニアが短期間で上位職に到達する事例が増えており、キャリアパスの多様化や個人の成長戦略への関心が高まっています。この記事は個人ブログの投稿で、昇進という結果よりも、その過程で得た洞察を伝えることに重きを置いているようです。 若手エンジニアの昇進体験談は、キャリア設計の参考として広く読まれる傾向があります。特に新卒からシニア職までの具体的な期間や経緯が示されることで、業界全体のキャリア基準や期待値の議論に影響を与える可能性があります。

🎯 **今日のアクション**
自身のキャリア成長を振り返り、昇進の条件や評価基準を上司や組織と明確にすり合わせておくことが重要です。他者の体験談を参考にしつつも、自分の環境に合った成長戦略を描きましょう。

🔗 [原文を読む](https://undecidability.net/senior/)

## 🔒 cPanelの暗黒の週：4万4千台のサーバーへのランサムウェア攻撃後、3つの新たな脆弱性にパッチ適用 - Copahost
\`Security\` \`Web\` \`Cloud\`

<details>
<summary>📄 原題: cPanel&amp;#039;s Black Week: Three New Vulnerabilities Patched After Ransomware Attack on 44,000 Servers - Copahost</summary>
</details>

> **一言で**: cPanelに3件の新脆弱性、4万4千台超のサーバーがランサムウェア被害

- 2026年5月8日、cPanel/WHMに新たな脆弱性3件が修正パッチとして公開
- CVE-2026-41940の認証バイパス脆弱性が悪用され、約4万4千台のサーバーがランサムウェア攻撃を受けた
- 最初の脆弱性公開からわずか10日で追加の脆弱性が発覚し、「Black Week」と呼ばれる事態に
- cPanel/WHMを運用中のサーバー管理者は早急なパッチ適用が必要

💡 **なぜ重要か**
cPanelはWebホスティング管理ツールとして世界中で広く使われています。認証バイパスという深刻な脆弱性が悪用されると、攻撃者はサーバーを乗っ取り、ランサムウェアを展開できます。今回は短期間に複数の脆弱性が連続して発覚しており、ホスティング業界全体に緊張が走っています。 共有ホスティング環境では一台のサーバーに多数のサイトが同居するため、被害が一気に広がるリスクがあります。今回の規模感（4万4千台超）は、ホスティングプロバイダーへの信頼性を揺るがす可能性があります。また、パッチ適用の遅れが常態化している中小ホスティング事業者の脆弱性管理体制の見直しを迫る契機になりそうです。

🎯 **今日のアクション**
cPanel/WHMを運用中の場合は直ちに最新バージョンへアップデートしてください。自動更新が有効になっているか確認し、WHMの「Update Preferences」で設定を見直すことを推奨します。また、不審なログインや異常なプロセスがないかサーバーログを確認し、バックアップの最新性も検証してください。

🔗 [原文を読む](https://www.copahost.com/blog/cpanels-black-week-three-new-vulnerabilities-patched-after-ransomware-attack-on-44000-servers/)

## 📝 まとめ

これら3つのニュースに共通するのは、**ツールや技術が「意図しない形で情報や体験を歪める」ことへの問題意識**と、それに対するエンジニアやツール開発者の自律的な反発・改善の動きだと言えます。LLMへの委任がドキュメントを破損させるリスクは、自動化の利便性と引き換えに人間の意図が失われるという本質的な緊張関係を示しており、クエリ文字列の追放はURLという情報インフラがトラッキングによって汚染されてきた現状への反省を反映しています。一方でZedのTheme Builderは、エディタという開発者の最も身近な環境を自分の手でコントロールしたいという欲求に応えるものです。全体として、これらのトレンドは「技術の利便性や外部サービスへの依存に対して、情報の純粋性・透明性・自己決定権を取り戻そうとする」開発者コミュニティの姿勢を映し出しており、AIや大規模プラットフォームへの依存が深まる時代における健全な揺り戻しとも読み取れます。

---

## 🎯 今日の実務アクション 3 選

1. **LLMに委任すると文書が歪められる**: LLMにドキュメント処理を任せる場合は、必ず人間が差分を確認するレビュー工程を設けてください。特に重要な仕様書や契約文書への適用は慎重に判断することをお勧めします。
2. **クエリ文字列を禁止した**: 自サービスのURLにトラッキングパラメータを付加する必要性を改めて見直し、Refererヘッダーなど既存の仕組みで代替できないか検討してみましょう。
3. **テーマビルダー**: Zedを使っている開発者は、Theme Builderを試して自分好みの配色を作成してみましょう。チームで統一テーマを作り、開発環境を整えるのも一つの活用法です。
