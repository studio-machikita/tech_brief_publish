<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-05-20</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-social {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 1rem;
}
.footer-social a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.footer-social a:hover {
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
}
.footer-spotify {
  width: auto !important;
  border-radius: 6px !important;
  padding: 0 8px;
}
.spotify-badge {
  height: 20px;
  width: auto;
  display: block;
}
.spotify-badge-light { display: none; }
.spotify-badge-dark { display: block; }
[data-theme="light"] .spotify-badge-light { display: block; }
[data-theme="light"] .spotify-badge-dark { display: none; }
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

## 🤖 MistralAIがEmmi AIを買収し、業界トップのAIスタックを構築へ
\`AI\` \`Startup\` \`Hardware\`

<details>
<summary>📄 原題: Mistral AI Acquires Emmi AI to Create the Leading AI Stack</summary>
</details>

> **一言で**: Mistral AIがウィーンのEmmi AIを買収し産業向けAIを強化

- フランスのMistral AIが、ウィーン拠点のスタートアップEmmi AIを買収
- 欧州の産業クライアント向けにAIスタックの提供範囲を拡大する狙い
- 物理AI（現実世界と連携するAI）領域への本格参入と見られる

💡 **なぜ重要か**
Mistral AIはOpenAIやAnthropicに対抗する欧州発のLLM（大規模言語モデル）企業です。欧州では製造業や重工業など産業分野でのAI活用ニーズが高まっており、ソフトウェアだけでなく現場の機器やセンサーと連携する「物理AI」の重要性が増しています。Emmi AIはその領域に特化したスタートアップだったと見られます。 欧州発のAI企業が産業向けの垂直統合型スタックを持つことで、米国勢に依存しない選択肢が生まれます。特に製造・物流・エネルギー分野では、データ主権を重視する欧州企業の需要を取り込める可能性があります。産業AIの競争が、クラウドAPIの提供にとどまらずハードウェアや現場システムとの統合へと広がる流れを加速させそうです。

🎯 **今日のアクション**
産業系システムの開発に携わるエンジニアは、Mistral AIの産業向けソリューションの動向を注視してください。欧州のデータ規制（GDPRなど）に準拠したAI基盤の選定を検討しているリーダーは、米国勢以外の選択肢として評価する価値があります。

🔗 [原文を読む](https://www.emmi.ai/news/mistral-ai-acquires-emmi-ai)

## 🌐 いちご - スーパースプラット
\`Web\` \`Science\` \`OSS\`

<details>
<summary>📄 原題: Strawberry - SuperSplat</summary>
</details>

> **一言で**: イチゴを90視点で撮影した3Dガウシアンスプラットデータ公開

- 90視点の撮影と88枚のフォーカススタック合成でイチゴを3D化
- SuperSplatプラットフォームでCC BY 4.0ライセンスにて公開
- ファイルサイズは約23MB、44,082個のガウシアン点群で構成
- SuperSplatはGPU高速化ヒストグラムや衝突生成など新機能を追加中

💡 **なぜ重要か**
ガウシアンスプラッティング（3D Gaussian Splatting）は、複数枚の写真から高品質な3Dシーンをリアルタイム描画できる技術です。2023年以降急速に注目を集め、SuperSplatはその編集・共有プラットフォームとして機能しています。フォーカススタック合成を組み合わせることで、マクロ撮影特有の被写界深度の浅さを克服し、細部まで鮮明な3Dモデルを生成できます。 高品質な3Dスキャンデータがオープンライセンスで共有される事例が増えると、食品・農業・ECなど多分野での3D活用が加速する可能性があります。SuperSplatのようなブラウザベースの編集・共有基盤の整備が、3Dコンテンツ制作の民主化を後押しするでしょう。

🎯 **今日のアクション**
3Dコンテンツ制作に関心のあるエンジニアは、SuperSplatの新機能（GPU高速化処理など）を試し、自社プロダクトへの3Dガウシアンスプラッティング導入を検討してみてください。

🔗 [原文を読む](https://superspl.at/scene/84df8849)

## 🤖 Gemini 3.5：最先端の知性とアクション機能を搭載
\`AI\` \`LLM\`

<details>
<summary>📄 原題: Gemini 3.5: frontier intelligence with action</summary>
</details>

> **一言で**: Gemini 3.5が「行動できるAI」として登場

- 新モデル「Gemini 3.5」はフロンティア級の知性と行動能力を組み合わせた設計
- タイトルの「action」は、単なる回答生成を超えた実行能力を示唆
- Jeff DeanやKoray Kavukcuogluら主要研究者が著者として名を連ねる公式発表

💡 **なぜ重要か**
大規模言語モデル（LLM）の競争は「賢さ」から「行動できるか」へと軸が移っています。GoogleがGemini 3.5でこの方向性を打ち出したことは、AIエージェント（自律的に作業をこなすAI）の実用化競争が本格化したことを示しています。 AIが「答えを出す」だけでなく「タスクを実行する」存在になると、ソフトウェア開発・業務自動化・情報収集の現場が大きく変わります。エンジニアの役割も、AIへの指示設計やその出力の検証へとシフトしていくと見られています。

🎯 **今日のアクション**
Gemini 3.5の公式ブログ記事を原文で確認し、どのような「行動能力」が実装されているかを把握しましょう。自社プロダクトへの組み込み可能性を早めに評価しておくことが重要です。

🔗 [原文を読む](https://blog.google/innovation-and-ai/models-and-research/gemini-models/gemini-3-5/)

## 🤖 AIエコシステムの安全性と透明性向上に向けたコンテンツの出所管理の推進
\`AI\` \`Security\`

<details>
<summary>📄 原題: Advancing content provenance for a safer, more transparent AI ecosystem</summary>
</details>

> **一言で**: OpenAIがAI生成コンテンツの出所証明技術を推進

- Content Credentials（コンテンツの来歴情報を埋め込む規格）を採用
- SynthID（Googleが開発した電子透かし技術）との連携も進める
- AI生成メディアを識別・検証するツールも提供予定
- 透明性と信頼性の確保が主な目的

💡 **なぜ重要か**
生成AIの普及で、フェイク画像や偽情報が社会問題になっています。コンテンツがAIで作られたかどうかを判別する手段がなければ、情報の信頼性は根底から揺らぎます。こうした背景から、AI生成物の「出所証明（プロベナンス）」技術への関心が業界全体で高まっています。 Content CredentialsやSynthIDのような標準・技術が普及すれば、AIコンテンツの識別が当たり前になります。メディア、広告、法務など幅広い分野で「AI製かどうか」の確認が業務フローに組み込まれる可能性があります。業界横断の標準化が進むかどうかが、今後の鍵になるでしょう。

🎯 **今日のアクション**
自社サービスでAI生成コンテンツを扱う場合、Content Credentialsへの対応を検討してください。また、OpenAIが提供する検証ツールの仕様を早めに把握し、コンテンツ管理フローへの組み込みを検討することをお勧めします。

🔗 [原文を読む](https://openai.com/index/advancing-content-provenance/)

\`AI\` \`Web\` \`Business\`

<details>
<summary>📄 原題: A new era for AI Search</summary>
</details>

> **一言で**: Google SearchがAIエージェント機能を大幅強化

- Google I/O 2026でSearch向けAIエージェント機能の新アップデートを発表
- AI Searchの新時代を宣言し、検索体験の根本的な変革を示唆
- Elizabeth Reidによる公式ブログで詳細が公開

💡 **なぜ重要か**
Googleは長年、検索エンジン市場のリーダーとして君臨してきました。しかしOpenAIなどのAI企業が台頭し、従来のキーワード検索に代わるAIチャット型の情報取得が普及しつつあります。この流れに対応するため、GoogleはSearchにAIエージェント機能を組み込む方向へ大きく舵を切っています。 検索エンジンがAIエージェントと融合することで、情報を「探す」行為から「AIに依頼する」行為へとユーザー行動が変わる可能性があります。SEOや広告モデルにも影響が及ぶと見られており、Web全体のエコシステムが再編されるかもしれません。

🎯 **今日のアクション**

> **一言で**: 自己ホスト型LLMのエージェント基盤「Forge」公開

- ForgeはPython製のフレームワークで、自己ホスト型LLMのツール呼び出しに対応
- 複数ステップのエージェント（自律的なAI処理）ワークフローを構築できる
- GitHub上のPRごとに実行されるエージェント処理のトークン効率改善が背景にある
- APIコストの肥大化を防ぐため、非効率な処理を検出・修正する仕組みを内包

💡 **なぜ重要か**
LLMを使ったエージェント処理をGitHubのCI/CDに組み込む動きが広がっています。しかしPRのたびにAPIを呼び出すと、トークン消費コストが静かに膨らむ問題があります。自己ホスト型LLMへの需要も高まっており、クラウドAPIに依存しない選択肢が求められています。 エージェント処理の自己ホスト化が進むと、クラウドLLMベンダーへの依存度が下がります。コスト管理とプライバシー確保の両立が現実的になり、中小規模の開発チームでも本格的なAIワークフローを導入しやすくなるでしょう。

🎯 **今日のアクション**
自社のCI/CDパイプラインでLLMを使っているチームは、トークン消費量を計測する仕組みをまず導入してください。Forgeのような自己ホスト型フレームワークの評価も並行して進めると、コスト削減の選択肢が広がります。

## 📝 まとめ

これら3つのニュースに共通するのは、AIが「理解する」段階から「現実世界に作用する」段階へと進化しつつあるという大きな潮流です。MistralのEmmi AI買収やGemini 3.5の「行動できるAI」というコンセプトは、AIをエージェントとして産業や日常のワークフローに深く組み込もうとする動きを示しており、単なる言語モデルの性能競争から実用的なスタック構築へと競争軸がシフトしていることを示唆しています。一方、イチゴの90視点撮影による3Dガウシアンスプラットデータの公開は一見異質に見えますが、現実空間を高精度にデジタル化する技術の民主化という観点では、AIエージェントが物理世界を認識・操作するための基盤データインフラの整備という文脈に位置づけられます。つまり、AIの行動能力を高めるためには「モデルの賢さ」だけでなく、「現実世界の忠実な表現」と「それを活用するための統合スタック」が三位一体で求められており、今回の3つのニュースはその異なる層をそれぞれ担う動きとして横断的に読み解くことができます。
