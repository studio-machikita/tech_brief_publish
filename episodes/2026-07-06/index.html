<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Baiduの「無制限OCR」、人間の忘却に似たメモリ管理で数十ページの文書を一括処理 ほか | Tech News Radio</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);

}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {

}
.hero-pill {

}
[data-theme="light"] .hero-pill {

}

/* RSS link */
.rss-link {

}
.rss-link:hover {

}

/* Episode list & cards */
.episodes-list {

  gap: 16px;
}
.episode-card {

}
.episode-card:hover {

  border-color: rgba(0, 216, 255, 0.3);

}

}
.episode-card:hover .episode-title {

}
.episode-date {

}
.episode-title {

}
.episode-meta {

}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;

}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }

/* Notice card */
.notice-card {

.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {

}
.notice-card li::before {

.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {

  font-weight: bold;
  margin-bottom: 20px;

}
.pagination {

}
.pagination a,

}
.pagination a:hover {

}
.pagination .current {

.pagination .summary {

.episode-page .cover {

}

.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;

  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {

  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;

  border-radius: 8px 8px 0 0;

}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;

  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }

}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {

  padding-left: 1rem;
}
.disclosure-list li::before {

  position: absolute;
  left: 0;

}

.button-link,

}

/* Contact form */
.contact-form {

  flex-direction: column;
  gap: 20px;
}
.form-grid {

  gap: 20px;
}
.form-grid > div { flex: 1; }

.contact-form input,
.contact-form textarea,
.contact-form select {

  border: 1px solid rgba(255, 255, 255, 0.15);

  font-family: inherit;

}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,

}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {

}
.contact-form textarea {

}
.checkbox-row {

.checkbox-row input { width: auto; }
.contact-form button {

  font-size: 1rem;
  border: none;
  border-radius: 6px;

}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {

/* Footer */
.footer-social {

/* Feedback Form */
.feedback-section {

}
.feedback-form {

.star-rating label::before { content: "★"; }

.share-btn {

</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;

## 🤖 Baiduの「無制限OCR」、人間の忘却に似たメモリ管理で数十ページの文書を一括処理
\`AI\` \`LLM\` \`Data\`

<details>
<summary>📄 原題: Baidu&#x27;s &quot;Unlimited OCR&quot; processes dozens of document pages in one pass by treating memory like human forgetting</summary>
</details>

> **一言で**: BaiduのOCRが数十ページを一括処理できる技術を開発

- Baiduの「Unlimited OCR」は数十ページを一度に処理できる
- 従来システムの上限は約10ページ程度だった
- 人間の忘却に着想を得た注意機構（アテンション）でメモリ使用量を一定に保つ
- 主要なOCRベンチマークで現在トップの成績を記録

💡 **なぜ重要か**
OCR（光学文字認識）技術は、紙の書類や画像からテキストを抽出する基盤技術です。従来のAIベースのOCRはページ数が増えるとメモリ消費が急増し、処理できる量に限界がありました。Baiduはこの制約を、人間の記憶の「忘却」を模した注意機構の改良で克服しました。大量の文書を扱う企業や行政のデジタル化需要が高まる中、この技術的突破は実用上の意義が大きいです。 メモリ効率の高いOCR技術が普及すれば、大量の紙文書を扱う金融・法務・医療などの分野でデジタル化が加速します。また、この「忘却型」の注意機構は他のAIモデルにも応用できる可能性があり、長文処理全般の効率改善につながると見られています。

🎯 **今日のアクション**
文書処理パイプラインを構築・運用しているエンジニアは、Baiduのこの手法を注視し、自社のOCRや長文処理モデルの置き換え候補として評価を始めるとよいでしょう。ベンチマーク結果の詳細が公開され次第、実際のユースケースで検証することをお勧めします。

🔗 [原文を読む](https://the-decoder.com/baidus-unlimited-ocr-processes-dozens-of-document-pages-in-one-pass-by-treating-memory-like-human-forgetting/)

## 🤖 ダートマス大学の講義で新しいAIチューターが0.71〜1.30SDの効果量を達成
\`AI\` \`LLM\` \`Science\`

> ⚠️ **注意**: この記事は情報源が限られているため、内容の正確性を保証できません。必要に応じて一次情報もご確認ください。

<details>
<summary>📄 原題: New AI tutor achieves 0.71-1.30 SD effect size in Dartmouth course [pdf]</summary>
</details>

> **一言で**: AIチューターがDartmouth大学で大きな学習効果を実証

- 新しいAIチューターが0.71〜1.30 SD（標準偏差）という高い学習効果を達成
- Dartmouth大学の実際のコースで効果を検証した点が注目される
- 1.0 SDを超える効果量は、教育介入としては非常に大きな水準とされる

💡 **なぜ重要か**
教育分野でのAI活用は注目されていますが、実際の大学授業での効果を定量的に示した研究はまだ少ないです。標準偏差（SD）を使った効果量の測定は、教育心理学で広く使われる客観的な指標です。今回のDartmouthでの実証は、AIチューターの有効性を示す具体的なデータとして意義があります。 AIチューターの学習効果が科学的に裏付けられると、大学や企業研修での導入が加速する可能性があります。個別最適化された学習支援が普及すれば、教育コストの削減や学習格差の縮小にもつながると見られています。

🎯 **今日のアクション**

## 🤖 AgentCore Memoryにおけるメタデータを用いた構造化メモリフィルタリング
\`AI\` \`Cloud\`

<details>
<summary>📄 原題: Structured memory filtering with metadata in AgentCore Memory</summary>
</details>

> **一言で**: AgentCore Memoryでメタデータを使った構造的なメモリ管理が可能に

- AgentCore Memoryはメタデータを使ってメモリの設定・取り込み・検索を制御できる
- マルチエージェントやマルチテナント構成など、企業向けユースケースにも対応
- メタデータフィルタリングにより、必要な情報だけを精度よく取り出せる
- 実装のベストプラクティスも紹介されており、現場への導入指針として活用できる

💡 **なぜ重要か**
AIエージェントが複数のユーザーやタスクを同時に扱う場面が増えています。そこで問題になるのが、誰のどの情報をいつ参照するかという「メモリ管理」です。メタデータを使ったフィルタリングは、この課題を構造的に解決するアプローチとして注目されています。 エンタープライズ向けAIエージェントの信頼性と安全性が高まります。特にマルチテナント環境では、テナント間のデータ混在リスクを減らせるため、業務システムへのAI導入が加速する可能性があります。

🎯 **今日のアクション**
AgentCore Memoryのメタデータ設計を早めに検討し、テナントやエージェントの識別子をメタデータとして付与する設計パターンを自社のアーキテクチャに組み込むことを検討してください。

🔗 [原文を読む](https://aws.amazon.com/blogs/machine-learning/structured-memory-filtering-with-metadata-in-agentcore-memory/)

## 🤖 AIに外部脳を持たせて1ヶ月運用した全記録
\`AI\` \`LLM\` \`OSS\`

> **一言で**: AIの記憶をObsidianで自作した1ヶ月の実録

- セッションをまたぐとAIの記憶がリセットされる問題を自作の外部記憶で解決
- 公式メモリ機能は中身が見えず、プロジェクト別管理もできないと指摘
- Obsidianをベースに、自分でルールを決められる外部脳を構築して運用

💡 **なぜ重要か**
LLM（大規模言語モデル）はセッションをまたいで文脈を保持できません。公式のメモリ機能は存在しますが、何を記憶するかをAI任せにせざるを得ず、複数プロジェクトの使い分けも難しい状況です。この課題は、AIを日常業務に組み込もうとするエンジニアや知識労働者が広く直面しています。 AIの記憶管理を自前で設計する動きが広がれば、特定のAIサービスへの依存度が下がります。ツールをまたいで文脈を持ち運べる仕組みが普及すると、AIの使い方そのものが「会話」から「継続的な協働」へと変わっていく可能性があります。

🎯 **今日のアクション**
まず自分のAI利用で何が毎回リセットされているかを書き出してみましょう。その上で、ObsidianなどのローカルノートツールをAIの外部記憶として試験運用し、プロジェクト別に文脈を管理する仕組みを小さく始めるのが現実的です。

🔗 [原文を読む](https://zenn.dev/nobu666/articles/ai-external-brain-digest)

\`Cloud\` \`Data\` \`DevOps\`

<details>
<summary>📄 原題: April 10, 2026</summary>
</details>

> **一言で**: Colab EnterpriseでSQLセルが正式提供開始

- Colab EnterpriseのSQLセルがGA（一般提供）に昇格
- ノートブック上でSQLクエリの記述・編集・実行が直接できる

💡 **なぜ重要か**
Colab Enterpriseは、Google CloudのマネージドなJupyterノートブック環境です。これまでSQLを実行するには外部ツールや別画面への切り替えが必要でした。SQLセルのGA化により、データエンジニアやアナリストがノートブック内でシームレスにデータ操作できるようになります。 ノートブック環境でのSQL対応は、データ分析ワークフローの統合を加速させます。PythonとSQLを行き来する手間が減り、分析から可視化までの作業を一つの画面で完結できる流れが業界標準になっていく可能性があります。

🎯 **今日のアクション**
Colab Enterpriseを利用中のチームは、SQLセルの公式ドキュメントを確認し、既存のデータ分析ワークフローへの組み込みを検討してみてください。特にBigQueryなどのデータソースとの連携方法を早めに把握しておくと良いでしょう。

## 🤖 Gemini 2.5 ProとGemini 3 Flashの廃止予定
\`AI\` \`DevOps\` \`LLM\`

<details>
<summary>📄 原題: Upcoming deprecation of Gemini 2.5 Pro and Gemini 3 Flash</summary>
</details>

> **一言で**: GitHub CopilotでGeminiモデルが7月末に廃止

- Gemini 2.5 ProとGemini 3 Flashが7月31日に廃止予定
- 対象はCopilot Chat、インライン編集、エージェントモード、コード補完など全機能
- GitHub Copilotで利用できるAIモデルの選択肢が変わる可能性あり

💡 **なぜ重要か**
GitHub CopilotはOpenAIモデルだけでなく、GoogleのGeminiシリーズも選択肢として提供してきました。複数のAIモデルを使い分けられる点がCopilotの強みの一つでしたが、今回の廃止はそのラインナップ見直しを意味します。AIモデルの世代交代が速い現在、開発ツールも対応モデルを頻繁に更新する必要があり、こうした廃止アナウンスは今後も続くと見られています。 AIコーディング支援ツールでは、利用できるモデルが定期的に入れ替わる運用が当たり前になりつつあります。エンジニアは特定モデルへの依存を避け、複数モデルを柔軟に切り替えられるワークフローを整える必要が出てきます。また、モデル廃止のたびに出力品質や挙動が変わるリスクへの備えも重要になるでしょう。

🎯 **今日のアクション**
7月31日までに、Gemini 2.5 ProやGemini 3 Flashを使っているチームは代替モデルへの移行計画を立てましょう。GitHub Copilotの設定でどのモデルを使っているか確認し、廃止後も業務が止まらないよう事前に切り替えテストを行うことをお勧めします。

🔗 [原文を読む](https://github.blog/changelog/2026-07-02-upcoming-deprecation-of-gemini-2-5-pro-and-gemini-3-flash)

## 📝 まとめ

これら3つのニュースに共通するのは、**AIシステムにおける「記憶・情報管理」の高度化**というテーマです。BaiduのOCR技術が人間の忘却メカニズムを模倣してメモリを効率的に管理し、AgentCore Memoryがメタデータによる構造化フィルタリングを実現しているように、AIが扱う情報量の爆発的な増大に対して、いかに賢く情報を取捨選択・整理するかが業界全体の重要課題となっています。一方でDartmouthのAIチューター実証研究は、そうした情報処理能力の向上が教育という具体的な応用領域で人間に対して測定可能な効果をもたらし始めていることを示しており、技術の成熟が実社会への展開フェーズに入りつつあることを示唆しています。全体として、AIの「認知能力」——記憶・検索・文脈理解——を人間の知的活動に近づける取り組みが加速しており、単なる処理性能の向上を超えて、AIが長期的かつ構造的に知識を扱えるエージェントへと進化しようとする大きなトレンドが読み取れます。
