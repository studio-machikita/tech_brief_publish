<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-04-22</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-social {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 1rem;
}
.footer-social a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.footer-social a:hover {
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
}
.footer-spotify {
  width: auto !important;
  border-radius: 6px !important;
  padding: 0 8px;
}
.spotify-badge {
  height: 20px;
  width: auto;
  display: block;
}
.spotify-badge-light { display: none; }
.spotify-badge-dark { display: block; }
[data-theme="light"] .spotify-badge-light { display: block; }
[data-theme="light"] .spotify-badge-dark { display: none; }
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

## 🤖 エージェント向けダイアグラムインフラ「zindex」
\`AI\` \`DevOps\`

<details>
<summary>📄 原題: zindex - diagram infrastructure for agents</summary>
</details>

> **一言で**: AIエージェント向けの図表管理基盤「zindex」登場

- エージェントが図表を作成・編集・検証・描画できる専用インフラ
- 図表を使い捨て出力ではなく、永続的な状態として管理する設計
- 40以上の検証ルールと不変リビジョン管理を備える
- Diagram Scene Protocol（DSP）で複数の描画先に対応

💡 **なぜ重要か**
AIエージェントがテキスト以外の成果物を扱う場面が増えています。図表はこれまで「生成して終わり」の使い捨てが多く、バージョン管理や検証の仕組みが整っていませんでした。zindexはその課題に正面から取り組むサービスだと見られています。 エージェントが図表を構造化データとして扱えるようになると、設計ドキュメントやシステム構成図の自動生成・更新ワークフローが現実的になります。図表をコードと同様に管理する文化が広がる可能性があります。

🎯 **今日のアクション**
公式ドキュメントとPlaygroundで実際の動作を確認し、自社のエージェント開発パイプラインに組み込めるか評価してみてください。特にDSPの仕様を早めに把握しておくと、将来の統合コストを下げられます。

🔗 [原文を読む](https://zindex.ai/)

## 🤖 CrabTrap：本番環境における安全なエージェント
\`AI\` \`Security\` \`OSS\`

<details>
<summary>📄 原題: CrabTrap: Secure Agents in Production</summary>
</details>

> **一言で**: AIエージェントのHTTPリクエストをリアルタイムで審査・制御するOSSプロキシ

- CrabTrapはAIエージェントが送るHTTPリクエストを仲介し、ポリシーに基づいて許可・遮断する
- LLMを審査役として使い、リクエストの安全性をリアルタイムで評価する仕組み
- オープンソースで公開済み。30秒で導入できるとうたっている
- 本番環境でのAIエージェント運用を安全にすることを主な目的としている

💡 **なぜ重要か**
AIエージェントが外部APIやシステムと自律的にやり取りする場面が増えています。しかし、エージェントが意図しない操作や悪意ある指示に従うリスクも高まっており、本番環境での安全策が業界全体の課題になっています。CrabTrapはそのギャップを埋めるツールとして登場しました。 AIエージェントのセキュリティ対策がインフラ層で標準化される流れを加速させる可能性があります。LLMを審査役に使うアプローチが普及すれば、エージェント向けのセキュリティ製品カテゴリが新たに確立されるかもしれません。

🎯 **今日のアクション**
本番環境でAIエージェントを運用しているチームは、CrabTrapのGitHubリポジトリを確認し、自社のポリシー要件に合うか評価してみましょう。導入コストが低いとされているため、まず検証環境で試すのが現実的な第一歩です。

🔗 [原文を読む](https://www.brex.com/crabtrap)

## 📦 テックノート：静的Windowsエミュレーター「Theseus」
\`OSS\` \`Hardware\`

<details>
<summary>📄 原題: Tech Notes: Theseus, a static Windows emulator</summary>
</details>

> **一言で**: 静的変換でWindowsアプリを動かす新エミュレータ「Theseus」登場

- Theseusは、x86/Windowsプログラムを静的（事前）変換で動かす新しいエミュレータ
- 作者の以前のプロジェクト「retrowin32」の後継・発展形と位置づけられている
- 静的変換により動的エミュレーションの課題を解決しつつ、新たな問題も生じる可能性あり
- retrowin32シリーズの最終回として、Theseusの紹介記事が公開された

💡 **なぜ重要か**
WindowsアプリをLinuxやWebなど他の環境で動かすエミュレーション技術は長年の課題です。多くのエミュレータは実行時に命令を逐次変換する動的方式を採りますが、Theseusは事前に静的変換する方式を選んでいます。この違いはパフォーマンスや互換性に大きく影響します。 静的変換アプローチが成熟すれば、レガシーWindowsアプリの移植や保存（デジタルアーカイブ）がしやすくなる可能性があります。OSSコミュニティでの実験的な取り組みが、将来の互換レイヤー技術に影響を与えるかもしれません。

🎯 **今日のアクション**
レトロソフトウェアの保存や互換性に関心のあるエンジニアは、Theseusのリポジトリを確認し、静的バイナリ変換の設計思想を学ぶ価値があります。

🔗 [原文を読む](https://neugierig.org/software/blog/2026/04/theseus.html)

## 🌐 ソフトウェアエンジニアリングの法則
\`Web\` \`DevOps\`

<details>
<summary>📄 原題: Laws of Software Engineering</summary>
</details>

> **一言で**: ソフトウェア工学の法則56個を集めたサイト

- Conway's Lawなど56の法則・原則をカード形式で一覧できる
- Junior・Mid・Seniorのレベル別、カテゴリ別でフィルタリング可能
- アーキテクチャ・チーム・品質・設計など幅広い分野をカバー

💡 **なぜ重要か**
ソフトウェア開発の現場では、経験則や設計原則が口伝えで共有されることが多く、体系的にまとめたリソースへの需要は常にあります。Conway's Lawのように数十年前に提唱された法則が今も通用する一方、新しいパターンも生まれ続けています。こうした知識を一か所に集約したサイトは、学習リソースとして実用的です。 チームや組織の意思決定に使える原則を体系化することで、エンジニアが経験に頼らず判断の根拠を言語化しやすくなります。特に若手エンジニアの育成や、チーム内の技術的議論の質向上に貢献できると見られています。

🎯 **今日のアクション**
自分のレベルに合ったフィルターで法則を絞り込み、日々の設計判断や振り返りの際に参照する習慣をつけましょう。チームの勉強会でカードを題材に議論するのも効果的です。

## 📝 まとめ

これらのニュースに共通するのは、**既存のシステムやインフラを「AIエージェント時代」あるいは「新しい実行環境」に対応させるための基盤整備**という潮流です。zindexとCrabTrapはいずれもAIエージェントを前提としたインフラ層のツールであり、エージェントが自律的に動作する場面での「管理・可視化」と「安全性・制御」という二つの課題にそれぞれ応えようとしています。AIエージェントの実用化が進むにつれ、エージェント単体の性能向上だけでなく、それを取り巻くエコシステム——監視、セキュリティ、データ構造——の整備が急務になっていることが見て取れます。一方でTheseusはやや異なる文脈ながら、静的変換という手法でレガシーな実行環境を再解釈しようとする点で、「既存の資産をいかに現代的なアーキテクチャへ橋渡しするか」という、業界全体に通底するテーマを共有しています。
