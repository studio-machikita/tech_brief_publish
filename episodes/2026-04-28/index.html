<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tech News Radio - 2026-04-28</title>
<style>:root {
  --bg: #121212;
  --surface: #1E1E1E;
  --surface-strong: #252525;
  --border: rgba(255, 255, 255, 0.05);
  --text: #E0E0E0;
  --text-muted: #A0A0A0;
  --accent: #00D8FF;
  --accent-light: #6C8AFF;
  --accent-soft: rgba(0, 216, 255, 0.1);
  --success: #10b981;
  --warning: #f59e0b;
  --strong: #fff;
  --border-radius: 12px;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --surface: #ffffff;
  --surface-strong: #f0f0f0;
  --border: rgba(0, 0, 0, 0.08);
  --text: #1a1a1a;
  --text-muted: #666666;
  --accent: #0099b3;
  --accent-light: #5060c0;
  --accent-soft: rgba(0, 153, 179, 0.08);
  --success: #059669;
  --warning: #d97706;
  --strong: #000;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }
button, input, textarea, select { font: inherit; }
.container { max-width: 800px; margin: 0 auto; padding: 40px 20px 80px; }

/* Header */
header {
  border-bottom: 1px solid var(--border);
  padding: 0;
  margin-bottom: 0;
}
header .container { padding: 24px 20px; }
header h1 { font-size: 1.5rem; font-weight: 700; }
header h1 a { color: var(--strong); }
header h1 a:hover { text-decoration: none; }
header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.25rem; }
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
}
.nav-links {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  overflow-x: auto;
  white-space: nowrap;
}
.nav-links::-webkit-scrollbar { display: none; }
.nav-links a {
  color: var(--text-muted);
  font-size: 0.95rem;
  font-weight: bold;
  padding: 8px 16px;
  transition: color 0.2s ease;
}
.nav-links a:hover { color: var(--strong); text-decoration: none; }
.theme-toggle {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  padding: 0.35rem 0.6rem;
  line-height: 1;
  transition: background 0.3s, border-color 0.3s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* Section titles */
.section-title {
  font-size: 1.8rem;
  font-weight: bold;
  margin-bottom: 8px;
  color: var(--strong);
  letter-spacing: 0.05em;
}
.section-subtitle {
  font-size: 1.4rem;
  font-weight: bold;
  margin: 40px 0 20px;
  color: var(--strong);
}
.section-desc {
  color: var(--text-muted);
  margin-bottom: 32px;
  font-size: 0.95rem;
}

/* Grid layout */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
}
.col-half { width: calc(50% - 12px); }
.col-full { width: 100%; }

/* Cards */
.card {
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 28px;
  box-sizing: border-box;
  border: 1px solid var(--border);
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
  border-color: rgba(0, 216, 255, 0.3);
}
[data-theme="light"] .card:hover {
  box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
  border-color: rgba(0, 153, 179, 0.3);
}
.card h2 {
  font-size: 1.25rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.card ul { list-style: none; padding-left: 0; margin: 0; }
.card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
  color: var(--text);
}
.card li:last-child { margin-bottom: 0; }
.list-check li::before { content: '\2713'; position: absolute; left: 0; color: var(--accent); font-weight: bold; font-size: 1.1em; }
.list-arrow li::before { content: '\2794'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.9em; top: 0.1em; }
.list-dot li::before { content: '\25A0'; position: absolute; left: 0; color: var(--text-muted); font-size: 0.6em; top: 0.5em; }

/* Hero card */
.hero-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 16px;
}
.hero-title {
  font-size: 1.5rem;
  color: var(--strong);
  margin-top: 0;
  margin-bottom: 16px;
  line-height: 1.4;
}
.hero-description {
  color: var(--text-muted);
  margin-bottom: 24px;
}
.hero-description:last-of-type { margin-bottom: 24px; }
.hero-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}
.hero-pill {
  background: var(--accent-soft);
  color: var(--accent);
  border: 1px solid rgba(0, 216, 255, 0.3);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: bold;
}
[data-theme="light"] .hero-pill {
  border-color: rgba(0, 153, 179, 0.3);
}

/* RSS link */
.rss-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  color: var(--text);
  text-decoration: none;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--border);
  font-size: 0.9rem;
  transition: all 0.2s ease;
  margin-bottom: 16px;
}
.rss-link:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
  transform: translateY(-2px);
  text-decoration: none;
}

/* Episode list & cards */
.episodes-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.episode-card {
  display: block;
  background: var(--surface);
  border-radius: var(--border-radius);
  padding: 20px 24px;
  border: 1px solid var(--border);
  text-decoration: none;
  transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
}
.episode-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.5);
  border-color: rgba(0, 216, 255, 0.3);
  text-decoration: none;
}
[data-theme="light"] .episode-card:hover {
  box-shadow: 0 8px 16px rgba(0, 0, 0, 0.08);
  border-color: rgba(0, 153, 179, 0.3);
}
.episode-card:hover .episode-title {
  color: var(--accent);
}
.episode-date {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.episode-title {
  font-size: 1.15rem;
  color: var(--accent-light);
  margin: 0 0 12px 0;
  font-weight: bold;
  transition: color 0.2s ease;
}
.episode-meta {
  display: flex;
  gap: 16px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

/* Content card (markdown pages) */
.content-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
}
.content-card h1 { font-size: 1.8rem; font-weight: bold; color: var(--strong); margin-bottom: 8px; letter-spacing: 0.05em; }
.content-card h2 { font-size: 1.25rem; color: var(--strong); margin-top: 28px; margin-bottom: 16px; }
.content-card h3 { font-size: 1.05rem; color: var(--accent-light); margin-top: 20px; margin-bottom: 8px; }
.content-card p { margin-bottom: 12px; color: var(--text); }
.content-card ul, .content-card ol { margin-left: 1.5rem; margin-bottom: 12px; }
.content-card li { margin-bottom: 6px; }

/* Notice card */
.notice-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 28px;
  margin-bottom: 24px;
  margin-top: 32px;
}
.notice-card h2 {
  font-size: 1.25rem;
  color: var(--accent-light);
  margin-top: 0;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(108, 138, 255, 0.2);
  display: flex;
  align-items: center;
  gap: 10px;
}
.notice-card h3 {
  font-size: 1rem;
  color: var(--accent-light);
  margin-bottom: 12px;
}
.notice-card ul { list-style: none; padding-left: 0; margin: 0; }
.notice-card li {
  position: relative;
  padding-left: 1.8em;
  margin-bottom: 14px;
  font-size: 0.95rem;
}
.notice-card li::before {
  content: '\25A0';
  position: absolute;
  left: 0;
  color: var(--text-muted);
  font-size: 0.6em;
  top: 0.5em;
}
.notice-card li:last-child { margin-bottom: 0; }

/* Pagination */
.page-heading {
  font-size: 1.4rem;
  font-weight: bold;
  margin-bottom: 20px;
  color: var(--strong);
}
.pagination {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin: 24px 0;
}
.pagination a,
.pagination span {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 2.4rem;
  padding: 0.55rem 0.8rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
}
.pagination a:hover {
  border-color: var(--accent);
  text-decoration: none;
}
.pagination .current {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.pagination .summary {
  min-width: auto;
  color: var(--text-muted);
  background: transparent;
  border: none;
}

/* Episode page */
.episode-page .cover {
  width: 100%;
  height: auto;
  max-height: 400px;
  object-fit: cover;
  border-radius: var(--border-radius);
  margin-bottom: 2rem;
  display: block;
}
.episode-page audio {
  width: 100%;
  margin-bottom: 1rem;
}
.episode-page .content {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  padding: 2rem;
  margin-bottom: 2rem;
}
.episode-page .content h1 { font-size: 1.4rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; color: var(--strong); }
.episode-page .content h2 { font-size: 1.2rem; margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-light); }
.episode-page .content h3 { font-size: 1.05rem; margin-top: 1.25rem; margin-bottom: 0.5rem; }
.episode-page .content p { margin-bottom: 0.75rem; }
.episode-page .content ul, .episode-page .content ol { margin-left: 1.5rem; margin-bottom: 0.75rem; }
.episode-page .content li { margin-bottom: 0.3rem; }
.episode-page .content strong { color: var(--strong); }
.episode-page .content em { color: var(--text-muted); }
.episode-page .content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
.episode-page .content a { word-break: break-all; }

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 0;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  overflow-x: auto;
  white-space: nowrap;
}
.tabs::-webkit-scrollbar { display: none; }
.tab-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  font-weight: bold;
  padding: 8px 16px;
  cursor: pointer;
  border-radius: 8px 8px 0 0;
  transition: color 0.2s ease;
  position: relative;
}
.tab-btn:hover { color: var(--strong); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: -9px;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Disclosure list */
.disclosure-list {
  list-style: none;
  margin-left: 0;
}
.disclosure-list li {
  position: relative;
  padding-left: 1rem;
}
.disclosure-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--accent-light);
}

/* Buttons */
.button-link,
.consent-action {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  padding: 0.7rem 1rem;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.button-link:hover,
.consent-action:hover {
  border-color: var(--accent);
}
.button-link.primary,
.consent-action.primary {
  background: var(--accent-light);
  border-color: var(--accent-light);
  color: #fff;
}
.button-link.primary:hover,
.consent-action.primary:hover {
  opacity: 0.85;
}

/* Contact form */
.contact-form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.form-grid {
  display: flex;
  gap: 20px;
}
.form-grid > div { flex: 1; }
.contact-form label {
  display: block;
  font-size: 0.9rem;
  color: var(--text);
  font-weight: bold;
  margin-bottom: 8px;
}
.contact-form input,
.contact-form textarea,
.contact-form select {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: var(--strong);
  padding: 12px;
  border-radius: 6px;
  font-size: 1rem;
  font-family: inherit;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
[data-theme="light"] .contact-form input,
[data-theme="light"] .contact-form textarea,
[data-theme="light"] .contact-form select {
  border-color: var(--border);
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0, 216, 255, 0.2);
}
.contact-form textarea {
  min-height: 180px;
  resize: vertical;
}
.checkbox-row {
  display: flex;
  gap: 8px;
  align-items: center;
  cursor: pointer;
  font-size: 0.9rem;
  color: var(--text-muted);
}
.checkbox-row input { width: auto; }
.contact-form button {
  background: var(--accent-light);
  color: #fff;
  font-weight: bold;
  font-size: 1rem;
  border: none;
  border-radius: 6px;
  padding: 14px;
  cursor: pointer;
  transition: opacity 0.2s ease, transform 0.1s ease;
  width: 100%;
}
.contact-form button:hover { opacity: 0.85; }
.contact-form button:active { transform: scale(0.98); }
.fine-print {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 16px;
}

/* Footer */
.footer-social {
  display: flex;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 1rem;
}
.footer-social a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.footer-social a:hover {
  color: var(--accent);
  border-color: var(--accent);
  text-decoration: none;
}
.footer-spotify {
  width: auto !important;
  border-radius: 6px !important;
  padding: 0 8px;
}
.spotify-badge {
  height: 20px;
  width: auto;
  display: block;
}
.spotify-badge-light { display: none; }
.spotify-badge-dark { display: block; }
[data-theme="light"] .spotify-badge-light { display: block; }
[data-theme="light"] .spotify-badge-dark { display: none; }
.footer-links {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  justify-content: center;
  margin-bottom: 0.75rem;
}
.footer-links a,
.footer-links button {
  font-size: 0.88rem;
  color: var(--text-muted);
}
.footer-links button {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}
footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 0 2rem;
  margin-top: 2rem;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
}
footer .container { padding: 0 20px; }

/* Consent banner */
.consent-banner {
  position: fixed;
  left: 1rem;
  right: 1rem;
  bottom: 1rem;
  z-index: 1000;
  max-width: 720px;
  margin: 0 auto;
  padding: 1rem 1rem 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--border-radius);
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
}
.consent-banner[hidden] { display: none; }
.consent-banner h3 {
  font-size: 1rem;
  margin-bottom: 0.45rem;
}
.consent-banner p {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 0.8rem;
}
.consent-actions {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

/* Feedback Form */
.feedback-section {
  margin-top: 2rem;
  padding: 1.5rem;
  border-radius: 12px;
  background: var(--card-bg, var(--surface));
}
.feedback-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.feedback-form fieldset {
  border: none;
  padding: 0;
  margin: 0;
}
.star-rating {
  display: flex;
  flex-direction: row-reverse;
  justify-content: flex-end;
  gap: 0.25rem;
}
.star-rating input { display: none; }
.star-rating label {
  cursor: pointer;
  font-size: 1.5rem;
  color: var(--text-muted);
}
.star-rating label::before { content: "★"; }
.star-rating input:checked ~ label,
.star-rating label:hover,
.star-rating label:hover ~ label {
  color: #f5a623;
}
.feedback-form label {
  display: block;
  font-weight: bold;
  margin-bottom: 0.5rem;
  color: var(--text);
}
.feedback-form textarea {
  width: 100%;
  padding: 0.75rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg);
  color: var(--text);
  font-family: inherit;
  resize: vertical;
}
.feedback-form button {
  margin-top: 0.5rem;
  padding: 0.5rem 1.5rem;
  border: none;
  border-radius: 8px;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  font-weight: 600;
}
.feedback-form button:hover {
  opacity: 0.9;
}

/* SNS Share Buttons */
.share-buttons {
  display: flex;
  gap: 1rem;
  margin: 1.5rem 0;
  flex-wrap: wrap;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.25rem;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 8px;
  text-decoration: none;
  transition: all 0.2s ease;
  font-weight: 600;
}
.share-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: translateY(-2px);
  text-decoration: none;
}
.share-x { color: var(--accent); }
.share-x:hover { background: var(--accent-soft); }
.share-fb { color: #1877f2; }
.share-fb:hover { background: rgba(24, 119, 242, 0.1); border-color: #1877f2; }

/* Responsive */
@media (max-width: 650px) {
  .col-half { width: 100%; }
  .form-grid { flex-direction: column; }
}
@media (max-width: 600px) {
  .container { padding: 20px 16px 60px; }
  header .container { padding: 16px; }
  .hero-card,
  .content-card,
  .notice-card,
  .card { padding: 20px; }
  .episode-page .content { padding: 1.25rem; }
  .header-row { align-items: flex-start; }
  .consent-banner { left: 0.75rem; right: 0.75rem; }
}
</style>
<script>
(function(){
  var t = localStorage.getItem('theme');
  if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
function toggleTheme(){
  var el = document.documentElement;
  if (el.getAttribute('data-theme') === 'light') {
    el.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
  } else {
    el.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
  }
  updateIcon();
}
function updateIcon(){
  var btn = document.getElementById('theme-btn');
  if (!btn) return;
  btn.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '\u263E' : '\u2600';
}
document.addEventListener('DOMContentLoaded', updateIcon);
</script>

## 🤖 ORAVYS - AI音声インテリジェンスプラットフォーム
\`AI\` \`Security\` \`Data\`

<details>
<summary>📄 原題: ORAVYS - AI Voice Intelligence Platform</summary>
</details>

> **一言で**: AIコントラクター4万人分の音声データ4TBが流出か

- AIコントラクター約4万人分の音声サンプル計4TBが盗まれたと報告
- ORAVYSはAI音声インテリジェンス基盤を提供するプラットフォーム
- 自分の音声データが悪用されているか確認する手段を提供している模様
- 音声データの大規模流出は、なりすましや詐欺に悪用されるリスクが高い

💡 **なぜ重要か**
AIモデルの学習用に音声を提供するコントラクター（業務委託者）が増える中、その音声データが大量に流出したと見られています。音声データは顔写真や指紋と同様に生体情報であり、一度流出すると変更できません。AIによる音声合成技術の進化で、盗まれた音声は本人になりすますディープフェイク音声の生成に使われる恐れがあります。 AIデータ収集業務に携わるコントラクターの個人情報保護が業界全体の課題になります。音声データを扱うプラットフォームへのセキュリティ要件が厳格化され、データ収集会社の責任範囲や規制整備の議論が加速するでしょう。また、音声を使った本人確認の信頼性にも疑問が生じます。

🎯 **今日のアクション**
AIデータ収集プロジェクトに音声提供した経験があるエンジニアや個人は、自分のデータが流出していないかORAVYSの確認ツールを使って調べることを検討してください。また、組織としてコントラクターから音声データを収集している場合は、保存・暗号化・アクセス制御の体制を早急に見直すべきです。

🔗 [原文を読む](https://app.oravys.com/blog/mercor-breach-2026)

## 🤖 GitHub - dirac-run/dirac：効率性とコンテキスト管理に特化したコーディングエージェント。他のエージェントと比較してAPIコストを50〜80%削減しながら、コード品質も同時に向上。ハッシュアンカー編集、大規模並列処理、AST操作など多数の最適化技術を採用。
\`AI\` \`LLM\` \`OSS\`

<details>
<summary>📄 原題: GitHub - dirac-run/dirac: Coding Agent singularly focused efficiency and context curation. Reduces API costs by 50-80% vs other agent AND improves the code quality at the same time. Uses Hash Anchored edits, massively parallel operations, AST manipulation and many many other optimizations.  https://dirac.run/</summary>
</details>

> **一言で**: API費用を最大80%削減するコーディングエージェント

- 他のエージェントと比べてAPI費用を50〜80%削減しつつ、コード品質も向上
- Hash Anchored edits（ハッシュ値で変更箇所を特定する編集方式）を採用
- AST（抽象構文木）操作と大規模並列処理で効率化を実現
- コンテキスト（AIに渡す情報）の取捨選択に特化した設計思想

💡 **なぜ重要か**
LLMを使ったコーディングエージェントはAPI呼び出しのたびにコストがかさみ、実用化の障壁になっています。多くのエージェントはコンテキストを無駄に大きく保持するため、費用対効果が低い状態でした。Diracはその課題に正面から取り組んだOSSプロジェクトです。 AIコーディングツールのコスト問題が解消されれば、個人開発者や小規模チームでも本格的なエージェント活用が現実的になります。効率重視の設計思想が業界標準になれば、他のエージェントフレームワークにも同様の最適化が波及するでしょう。

🎯 **今日のアクション**
自社のAIコーディングパイプラインでAPI費用が課題になっているなら、Diracのアーキテクチャ（特にHash Anchored editsとコンテキスト管理の仕組み）を調査する価値があります。OSSなのでコードを読んで自社ツールへの応用も検討できます。

## 🤖 中国、メタによるAIスタートアップ「Manus」買収を阻止
\`AI\` \`Business\` \`Startup\`

<details>
<summary>📄 原題: China blocks Meta&#x27;s acquisition of AI startup Manus</summary>
</details>

> **一言で**: 中国がMetaによるAIスタートアップManus買収を阻止

- 買収額は約20億ドル規模と報じられている

💡 **なぜ重要か**
Manusは中国発のAIエージェント（自律的にタスクをこなすAI）スタートアップです。米中の技術競争が激しくなる中、中国政府が自国のAI技術や人材が米国企業に渡ることを警戒したと見られています。買収完了後に当局が介入するのは異例で、中国がAI分野を戦略的資産として位置づけていることを示す動きです。 今後、中国発のAIスタートアップへの海外からの投資や買収は、規制リスクが格段に高まりそうです。グローバルなAI人材・技術の獲得競争において、地政学的な障壁がさらに大きくなる可能性があります。MetaをはじめとするUS企業は、中国市場や中国発技術へのアクセス戦略を根本から見直す必要に迫られるかもしれません。

🎯 **今日のアクション**
中国発スタートアップとの提携や買収を検討している企業は、規制リスクの事前評価を必須プロセスに組み込むべきです。エンジニアやリーダーは、地政学リスクをM&Aや技術調達の判断軸に加えることを検討してください。

## 🤖 GitHubコパイロット、従量課金制へ移行
\`AI\` \`DevOps\` \`Business\`

<details>
<summary>📄 原題: GitHub Copilot is moving to usage-based billing</summary>
</details>

> **一言で**: GitHub Copilotが従量課金制へ移行

- GitHub Copilotの料金体系が、定額制から使った分だけ払う従量課金制に変わる
- 利用量に応じた課金モデルは、ライトユーザーにとってコスト削減の機会になり得る
- 一方、ヘビーユーザーや企業にとっては月額コストが読みにくくなる可能性がある

💡 **なぜ重要か**
GitHub Copilotはこれまで月額定額制で提供されてきましたが、AIコーディング支援ツールの競争が激化する中、柔軟な料金設定への需要が高まっています。従量課金制はクラウドサービスでは一般的な手法で、GitHubもこの流れに乗った形と見られています。 AIコーディング支援ツール全体の料金モデルに影響を与える可能性があります。競合サービスも同様の従量課金制を採用する動きが加速するかもしれません。また、企業の開発コスト管理において、AIツールの利用量を可視化・最適化する必要性が高まるでしょう。

🎯 **今日のアクション**
現在GitHub Copilotを使っているエンジニアやチームリーダーは、自分たちの月間利用量を把握しておくことが先決です。新料金体系の詳細が公開され次第、定額制と従量課金制のどちらがコスト的に有利かを試算し、予算計画を見直すことをお勧めします。

🔗 [原文を読む](https://github.blog/news-insights/company-news/github-copilot-is-moving-to-usage-based-billing/)

## 🔬 「なぜLeanを使わないのか？」
\`Science\` \`OSS\`

<details>
<summary>📄 原題: &quot;Why not just use Lean?&quot;</summary>
</details>

> **一言で**: 数学形式化ツールLean一強への疑問と警鐘

- 数学の形式化（コンピュータで証明を検証する手法）を提案する際、Lean以外を選ぶ理由の説明が求められる風潮がある
- 著者は40年前に依存型（dependent type）の世界を離れた理由として、その閉鎖性や画一性を挙げる
- Leanは優れた言語・ツール・大規模ライブラリを持つが、それが「唯一の選択肢」扱いされることへの批判

💡 **なぜ重要か**
Leanは近年、数学の形式化コミュニティで急速に普及し、事実上の標準ツールになりつつあります。しかし特定ツールへの集中は、多様なアプローチや研究の萎縮につながる恐れがあります。AUTOMATH、LCF、HOL Lightなど長い歴史を持つ形式証明システムの文脈から、この問題を問い直す内容です。 ソフトウェアや数学の形式検証分野で、Lean一強の流れが続けば、代替ツールの研究・開発が停滞するリスクがあります。技術選定における「空気」や同調圧力は、形式検証に限らずIT業界全体でも起きやすい問題です。

🎯 **今日のアクション**
ツール選定時は「みんなが使っているから」ではなく、要件・思想・エコシステムを比較した上で判断する習慣を持ちましょう。特に形式検証を検討するチームは、Lean以外の選択肢も調査した上で採用理由を言語化することが重要です。

## 🔧 RF工学の静かな復活
\`Hardware\` \`Science\` \`Business\`

<details>
<summary>📄 原題: The Quiet Resurgence of RF Engineering</summary>
</details>

> **一言で**: RF工学が静かに復権しつつある

- 航空宇宙業界で8年働いた著者が、RF工学の変化を実感
- かつては「ソフトウェアへ行け」が業界の定番アドバイスだった
- RF工学は停滞した分野と見られていたが、その認識が変わりつつある

💡 **なぜ重要か**
RF（無線周波数）工学は長年、機械学習やクラウドといったソフトウェア分野の陰に隠れてきました。航空宇宙や通信インフラの現場では不可欠な技術でありながら、キャリア選択の優先度は低く見られがちでした。しかし5G・衛星通信・ドローンなどハードウェアを伴う無線技術の需要が高まる中、RF工学の専門家が改めて注目されているようです。 ソフトウェア一辺倒だったエンジニアリングのキャリア観が見直されるきっかけになりそうです。特に宇宙・防衛・通信インフラ分野では、RF技術者の希少性がそのまま市場価値につながる可能性があります。ハードウェアとソフトウェアを両立できる人材への需要が、今後さらに高まると見られています。

🎯 **今日のアクション**
ソフトウェアエンジニアはRF工学の基礎（アンテナ設計・変調方式など）を学ぶ価値があります。採用担当者は、RF専門人材の市場希少性を踏まえた報酬設計を検討すべきでしょう。
